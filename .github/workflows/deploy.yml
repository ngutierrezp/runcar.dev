name: Build & Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

# Paths on the VM (must match nginx `root` for HTTPS in nginx/runcar.dev)
env:
  VM_SITE_ROOT: /home/ngutierrezp/runcar.dev
  VM_NGINX_AVAILABLE: /etc/nginx/sites-available/runcar.dev
  VM_NGINX_ENABLED: /etc/nginx/sites-enabled/runcar.dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate unique version
        run: |
          VERSION_TAG=$(git tag | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
          echo "Latest version tag: $VERSION_TAG"
          if [ -z "$VERSION_TAG" ]; then
            echo "No version tags found. Proceeding."
          else
            echo "Checking if version tag $VERSION_TAG already exists on this commit."
            CURRENT_COMMIT=$(git rev-parse HEAD)
            TAG_COMMIT=$(git rev-list -n 1 $VERSION_TAG)
            if [ "$CURRENT_COMMIT" = "$TAG_COMMIT" ]; then
              echo "❌ This commit is already tagged as $VERSION_TAG. Please update package.json and create a new version tag."
              exit 1
            fi
          fi
          echo "✅ This commit is not tagged with the latest version. Proceeding."

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }} .
          docker tag ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }} ghcr.io/${{ github.repository }}:latest

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Create Github version tag
        if: startsWith(github.ref, 'refs/heads/main')
        env:
          GH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
        run: |
          gh config set prompt disabled
          VERSION="v${{ steps.version.outputs.version }}"
          echo "Checking if tag $VERSION already exists..."
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Tag $VERSION already exists. Skipping release creation."
            exit 0
          fi
          echo "Creating release and tag $VERSION"
          gh release create $VERSION --title "$VERSION" --notes "Release $VERSION" --target "${GITHUB_SHA}"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Static site + nginx (repo is source of truth; keeps https:// in sync with git) ---
      - name: Upload static site (html/)
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_KEY_PASSPHRASE }}
          source: "html"
          target: ${{ env.VM_SITE_ROOT }}/
          overwrite: true

      - name: Upload nginx site config
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_KEY_PASSPHRASE }}
          source: "nginx/runcar.dev"
          target: /tmp/

      - name: Apply nginx config, reload, and update Docker container
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Same-repo GHCR pull works with GITHUB_TOKEN. Optional: set secret
          # GHCR_READ_TOKEN (PAT with read:packages) if pulls from the VM fail.
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_KEY_PASSPHRASE }}
          envs: GHCR_TOKEN
          script: |
            set -euo pipefail
            echo "=== Install nginx site config ==="
            if [ -f /tmp/runcar.dev ]; then
              SRC=/tmp/runcar.dev
            elif [ -f /tmp/nginx/runcar.dev ]; then
              SRC=/tmp/nginx/runcar.dev
            else
              echo "Uploaded nginx config not found under /tmp"
              ls -la /tmp || true
              exit 1
            fi
            sudo cp "$SRC" ${{ env.VM_NGINX_AVAILABLE }}
            sudo ln -sf ${{ env.VM_NGINX_AVAILABLE }} ${{ env.VM_NGINX_ENABLED }}
            sudo nginx -t
            sudo systemctl reload nginx
            echo "=== Docker: login, pull, restart runcar ==="
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull "ghcr.io/${{ github.repository }}:latest"
            docker stop runcar 2>/dev/null || true
            docker rm runcar 2>/dev/null || true
            docker run -d --name runcar -p 3000:3000 "ghcr.io/${{ github.repository }}:latest"
            echo "=== Done ==="
